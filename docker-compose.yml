services:
  web:
    build: .
    image: ofx-converter-web:latest
    container_name: ofx-converter-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      STORAGE_DIR: /app/storage
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
