<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ConvertOFX — Converta arquivos OFX em PDF e Excel automaticamente com identidade ORA Empresas." />
    <title>{{ app_name }} · ORA Empresas</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='favicon.svg') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  </head>
  <body>
    <div class="ambient-bg" aria-hidden="true">
      <div class="ambient-squares">
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
        <span class="ambient-square"></span>
      </div>
    </div>

    <!-- ── TOP BAR ──────────────────────────────────── -->
    <header class="topbar" role="banner">
      <div class="topbar-inner">
        <img
          class="brand-logo"
          src="{{ url_for('static', path='logoora.png') }}"
          alt="ORA Empresas"
        />
        <div class="topbar-meta">
          <strong>{{ app_name }}</strong>
          <p>Ambiente corporativo ORA Empresas</p>
        </div>
      </div>
    </header>

    <!-- ── MAIN ─────────────────────────────────────── -->
    <main class="page-shell" role="main">
      <article class="hero-card">

        <!-- Card Header -->
        <header class="card-header">
          <span class="eyebrow" aria-label="Seção de upload e conversão">Upload e conversão</span>
          <h1>ConvertOFX</h1>
          <p class="subtitle">
            Conversor OFX para XLSX e PDF.
          </p>
        </header>

        <!-- Card Body -->
        <div class="card-body">

          <!-- Upload Form -->
          <form id="convertForm" class="upload-form" enctype="multipart/form-data" novalidate>

            <!-- Drop Zone -->
            <label class="upload-field" for="file" id="uploadZone">
              <!-- Cloud upload icon -->
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
                <path d="M12 12v9"/>
                <path d="m16 16-4-4-4 4"/>
              </svg>

              <span class="upload-label-text">Clique para selecionar ou arraste aqui</span>
              <span class="upload-label-hint">Apenas arquivos <strong>.OFX</strong></span>
              <span class="upload-filename" id="uploadFilename" aria-live="polite"></span>

              <input
                id="file"
                type="file"
                name="file"
                accept=".ofx"
                required
                aria-label="Selecionar arquivo OFX"
              />
            </label>

            <!-- Action Buttons -->
            <div class="form-actions">
              <button id="submitButton" class="primary-btn" type="submit">
                <!-- Convert icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span class="btn-text">Converter e Enviar</span>
                <span class="btn-spinner" aria-hidden="true"></span>
              </button>


            </div>
          </form>

          <!-- Progress -->
          <div id="progressWrapper" class="progress-wrapper hidden" role="status" aria-live="polite">
            <div class="progress-info">
              <span id="progressStep" class="progress-step-label">Preparando...</span>
              <span id="progressPercent" class="progress-pct">0%</span>
              <span id="progressSuccess" class="progress-success hidden" aria-hidden="true">
                <span class="success-check">✓</span>
                <span>Concluído</span>
              </span>
            </div>
            <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
          </div>

          <!-- Message -->
          <div id="messageBox" class="message-box hidden" role="alert" aria-live="assertive"></div>

          <!-- Downloads -->
          <div id="downloadArea" class="download-area hidden">
            <h2>Arquivos gerados</h2>
            <div class="download-actions">
              <a id="downloadPdf" class="download-btn download-btn-pdf hidden" href="#" target="_blank" rel="noopener noreferrer">
                <!-- PDF icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                Baixar PDF
              </a>

              <a id="downloadExcel" class="download-btn download-btn-excel hidden" href="#" target="_blank" rel="noopener noreferrer">
                <!-- Table/Excel icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
                  <line x1="3" y1="9" x2="21" y2="9"/>
                  <line x1="3" y1="15" x2="21" y2="15"/>
                  <line x1="9" y1="3" x2="9" y2="21"/>
                  <line x1="15" y1="3" x2="15" y2="21"/>
                </svg>
                Baixar Excel
              </a>
            </div>
          </div>

        </div><!-- /card-body -->

        <!-- Card Footer -->
        <footer class="card-footer">
          <span>ORA Empresas</span>
          <span class="dot" aria-hidden="true"></span>
          <span>Processamento seguro</span>
          <span class="dot" aria-hidden="true"></span>
          <span>Dados privados</span>
        </footer>

      </article>
    </main>

    <script src="{{ url_for('static', path='app.js') }}" defer></script>
  </body>
</html>
